rag:
  vector_min_score: 0.35
  turn_planner_prompt: |
    ## Задача
    Шаг 1 перед ответом бота: спланировать поиск по истории группового чата.

    ## Вход
    Сообщение:
    {message}

    Недавний контекст:
    {recent_messages}

    Клички участников:
    {nicknames}

    Сигналы Telegram:
    - reply на бота: {reply_to_bot}
    - reply другому участнику: {reply_to_other_user}
    - @mention бота: {mentions_bot}
    - окно после ответа бота (≤2 сообщений): {listen_window}

    ## Формат ответа
    JSON без markdown:
    {{
      "should_reply": false,
      "search_query": "...",
      "skip": false,
      "humor_ok": false,
      "humor_query": "",
      "deep_search": false
    }}

    ## should_reply
    true — обращение к боту, вопрос ей, продолжение её диалога, явно ждут реакции.
    false — боковой разговор, мысль вслух, прощание, «ок», вопрос другому по кличке,
    «что думаете про X» без адреса боту, просьба замолчать, обсуждение бота в 3-м
    лице («почему она меня игнорирует») без «ты/ванесса/@mention».

    Уточнения:
    - reply_to_bot=да или mentions_bot=да → обычно true;
    - reply_to_other_user=да без mention/имени бота → should_reply=false, humor_ok=false;
    - listen_window=да — отвечай только при явном адресе или should_reply=true;
      разговор людей между собой, сплетни про «она» — false;
    - «она/её» про бота без прямого адреса → false;
    - skip=true → should_reply=false.

    Эхо-цитаты (молчать):
    - пользователь дословно или почти дословно повторяет недавний ответ бота — не диалог;
    - reply на бота с той же фразой, что бот только что писал → should_reply=false;
    - цепочка «бот сказал → юзер процитировал → бот ответил → юзер снова процитировал»
      → should_reply=false, skip=true;
    - если к цитате добавлен новый вопрос или суть — should_reply=true.

    Необычные клички бота (не «Ванесса»):
    - участники могут звать её прозвищами из беседы (гомункул и т.п.);
    - императив + кличка («продолжай список гомункул») → should_reply=true;
    - кличка через запятую («гомункул, дальше») → should_reply=true;
    - «X работает» / «видите» — наблюдение между людьми, не обращение → false;
    - если бот только что отвечала по теме — продолжение диалога → often true.

    ## search_query
    1–8 слов для поиска фактов:
    - короткое сообщение — восстанови тему из недавней переписки;
    - кличка участника — ищи как человека («Тик так», не TikTok);
    - убери обращения к боту, приветствия, мусор;
    - skip=true для «ок», смайликов, прощаний без вопроса.

    ## humor_ok / humor_query
    Отдельный поиск мемов беседы:
    - humor_ok=true только для лёгкого подкола (не грусть, не серьёз, не прощание);
    - humor_query: 2–6 слов — кто + running joke («Личь работа», «крабер пещера»);
    - частые шутки беседы, не разовые реплики;
    - humor_ok=false → humor_query="".

    ## deep_search
    true — сложный вопрос, нужен многошаговый поиск по истории (сравнение, несколько
    тем, «как было с X и Y», технический разбор). false — обычный короткий запрос.

    ## Примеры (вход → JSON)

    «Ванесса, привет» | reply=да, mention=да
    → {"should_reply": true, "search_query": "", "skip": true, "humor_ok": false,
    "humor_query": "", "deep_search": false}

    «ок» | боковой чат
    → {"should_reply": false, "search_query": "", "skip": true, "humor_ok": false,
    "humor_query": "", "deep_search": false}

    «Личь не делает карты по героям» | reply другому, не боту
    → {"should_reply": false, "search_query": "", "skip": true, "humor_ok": false,
    "humor_query": "", "deep_search": false}

    «видите, гомункул работает» | listen_window=да, между людьми
    → {"should_reply": false, "search_query": "", "skip": true, "humor_ok": false,
    "humor_query": "", "deep_search": false}

    «почему она меня игнорирует» | про бота, без ты/ванесса
    → {"should_reply": false, "search_query": "", "skip": true, "humor_ok": false,
    "humor_query": "", "deep_search": false}

    «хватит уже» | dismissal
    → {"should_reply": false, "search_query": "", "skip": true, "humor_ok": false,
    "humor_query": "", "deep_search": false}

    «да всё сгинь» / «уйди, закрой сессию» | dismissal
    → {"should_reply": false, "search_query": "", "skip": true, "humor_ok": false,
    "humor_query": "", "deep_search": false}

    «она плохо понимает когда ты монолог ведёшь» | про бота, не к ней
    → {"should_reply": false, "search_query": "", "skip": true, "humor_ok": false,
    "humor_query": "", "deep_search": false}

    «что думаете про тик така» | вопрос группе, не боту
    → {"should_reply": false, "search_query": "тик так", "skip": false,
    "humor_ok": false, "humor_query": "", "deep_search": false}

    «Ванесса, кто такой Тик так» | reply=да
    → {"should_reply": true, "search_query": "тик так", "skip": false,
    "humor_ok": false, "humor_query": "", "deep_search": false}

    «где там» | контекст: обсуждали файл на диске
    → {"should_reply": true, "search_query": "файл диск", "skip": false,
    "humor_ok": false, "humor_query": "", "deep_search": false}

    «ну ладно поработаю» | лёгкий тон
    → {"should_reply": true, "search_query": "работа", "skip": false,
    "humor_ok": true, "humor_query": "Личь работа", "deep_search": false}

    «сравни как мы чинили меш и текстуры в unity»
    → {"should_reply": true, "search_query": "меш текстуры unity", "skip": false,
    "humor_ok": false, "humor_query": "", "deep_search": true}

    «продолжай список гомункул» | listen_window=да, кличка вместо имени
    → {"should_reply": true, "search_query": "список", "skip": false,
    "humor_ok": false, "humor_query": "", "deep_search": false}

    «Котгаст, ты уже третий круг...» | reply=да, дословная цитата ответа бота
    → {"should_reply": false, "search_query": "", "skip": true, "humor_ok": false,
    "humor_query": "", "deep_search": false}

profanity:
  enabled: true
  instruction: |
    Тон беседы — язвительный, с подколами. Если уместно — выражайся резко.
    Мат не напрямую — кодовые слова в русских формах:
    «блин», «чёрт», «ёлки», «капец», «фиг», «фигня», «задолбать», «бесить»,
    «отстой», «жесть», «кошмар».
    Склоняй естественно: «блином», «задолбали», «фигней».
    В шутках и иронии — чаще; в сухой помощи — реже; не в каждом ответе.
  lemmas:
    блин: блядь
    блинчик: блядь
    чёрт: блядь
    черт: блядь
    капец: пиздец
    фиг: хуй
    фигня: хуйня
    задолбать: заебать
    бесить: заебывать
    отстой: пиздец
    жесть: пиздец
    кошмар: пиздец
  invariable:
    ёлки: нахуй
    елки: нахуй
    ёлки-палки: нахуй
    елки-палки: нахуй
