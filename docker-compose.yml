x-app-image: &app-image
  image: vanessa-app:latest
  build: .

services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=128MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vanessa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanessa}
      POSTGRES_DB: ${POSTGRES_DB:-vanessa}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vanessa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    environment:
      QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD: 20000
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    <<: *app-image
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - huggingface_cache:/app/.cache/huggingface

  bot:
    <<: *app-image
    command: python -m app.bot.main
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./config:/app/config

volumes:
  postgres_data:
  qdrant_data:
  huggingface_cache:
